<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNES HUB - Central de Datos Cloud 24/7</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: #161b22;
            --accent: #b314da; /* Púrpura Blogger */
            --accent-hover: #d11aff;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --header-bg: rgba(22, 27, 34, 0.8);
            --border: #30363d;
            --gold: #ffcc00;
            --cyan: #00ffcc;
            --modal-bg: rgba(10, 12, 16, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            position: sticky; top: 0;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .logo { display:flex; align-items:center; gap:0.8rem; font-size:1.5rem; font-weight:800; color:#fff; }
        .logo span { color: var(--accent); }

        nav { display: flex; gap: 1rem; }
        .nav-btn {
            background: transparent; border: none; color: var(--text-dim);
            font-family: inherit; font-size: 0.9rem; cursor: pointer;
            padding: 0.5rem 0.5rem; border-bottom: 2px solid transparent;
            transition: 0.3s; display: flex; align-items: center; gap: 0.5rem;
            font-weight: 600;
        }
        .nav-btn:hover, .nav-btn.active { color: #fff; border-bottom-color: var(--accent); }

        main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

        .search-box {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 2.5rem;
            display: flex; gap: 1rem; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .search-box input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-family: inherit; font-size: 1.1rem; outline: none;
        }

        /* SESSION CARDS */
        .session-card-pro {
            background: #141418; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 1rem; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .session-header {
            padding: 1.2rem; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); cursor: pointer;
        }
        .session-header:hover { background: rgba(255,255,255,0.05); }
        
        .track-title { font-size: 1.2rem; font-weight: 800; color: #fff; }
        .car-subtitle { font-size: 0.85rem; color: var(--cyan); font-weight: 600; }
        .winner-tag { color: var(--gold); font-weight: 800; text-align: right; }
        .pole-tag { font-size: 0.75rem; color: var(--cyan); opacity: 0.8; text-align: right; }

        .blogger-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; font-size: 0.85rem; color: #ccc; }
        .blogger-table th { color: #555; font-size: 0.65rem; text-transform: uppercase; padding: 10px; text-align: left; }
        .blogger-table tr { background: rgba(255,255,255,0.03); }
        .blogger-table td { padding: 10px; }

        /* LIST ITEMS */
        .list-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.8rem 1.5rem;
            display: grid; grid-template-columns: 60px 1fr 100px 100px 100px auto;
            align-items: center; gap: 1rem; margin-bottom: 0.5rem;
            transition: 0.2s; cursor: pointer;
        }
        .list-item:hover { border-color: var(--accent); transform: scale(1.01); background: rgba(179, 20, 218, 0.05); }

        /* MODAL PROFILE */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        #modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 900px;
            max-height: 90vh; overflow-y: auto; border-radius: 20px;
            border: 1px solid var(--border); position: relative;
        }
        .modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #fff; }

        /* RECORDS SELECTORS */
        .records-selectors { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .selector-box {
            flex: 1; min-width: 250px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 10px; padding: 1rem;
        }
        .selector-box label { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .selector-box select {
            width: 100%; background: transparent; border: none; color: #fff;
            font-family: inherit; font-size: 1.1rem; outline: none; cursor: pointer;
        }

        /* UTILS */
        .badge { font-weight: 800; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
        .badge-clean { background: #238636; color: #fff; }
        .badge-pos1 { background: var(--gold); color: #000; }
        
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .list-item { grid-template-columns: 50px 1fr auto; }
            .item-val, .item-label, .pole-tag { display: none; }
            nav { gap: 0.2rem; }
            .nav-btn span { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i data-lucide="shield-check"></i>
            CENTRAL<span>DATOS</span>
        </div>
        <nav>
            <button class="nav-btn active" id="btn-history" onclick="showTab('history')"><i data-lucide="calendar"></i> <span>Carreras</span></button>
            <button class="nav-btn" id="btn-records" onclick="showTab('records')"><i data-lucide="gauge"></i> <span>Récords</span></button>
            <button class="nav-btn" id="btn-ranking" onclick="showTab('ranking')"><i data-lucide="trophy"></i> <span>Ranking</span></button>
            <button class="nav-btn" id="btn-community" onclick="showTab('community')"><i data-lucide="users"></i> <span>Comunidad</span></button>
            <button class="nav-btn" id="btn-analytics" onclick="showTab('analytics')"><i data-lucide="bar-chart-3"></i> <span>Stats</span></button>
            <button class="nav-btn" id="btn-sancionados" onclick="showTab('sancionados')"><i data-lucide="user-x"></i> <span>Baneados</span></button>
        </nav>
    </header>

    <main>
        <div id="search-section">
            <div class="search-box">
                <i data-lucide="search" style="color: var(--text-dim)"></i>
                <input type="text" id="mainSearch" placeholder="Buscar por piloto, circuito o coche..." oninput="render()">
                
                <select id="timeFilter" class="nav-btn" style="border:1px solid var(--border); padding:0.5rem 1rem; border-radius:8px;" onchange="render()">
                    <option value="all">Todo el tiempo</option>
                </select>
            </div>
        </div>

        <div id="records-section" style="display:none;">
            <div class="records-selectors">
                <div class="selector-box">
                    <label>Circuito</label>
                    <select id="recordTrack" onchange="updateRecordSelectors('track')"></select>
                </div>
                <div class="selector-box">
                    <label>Vehículo</label>
                    <select id="recordCar" onchange="updateRecordSelectors('car')"></select>
                </div>
            </div>
        </div>

        <div id="loader" style="text-align:center; padding:5rem;">
            <div class="spinner" style="margin:0 auto 1rem;"></div>
            <p style="color:var(--text-dim);">Sincronizando datos de la nube...</p>
        </div>

        <div id="content"></div>
    </main>

    <div id="modal">
        <div class="modal-content">
            <i data-lucide="x" class="modal-close" onclick="closeModal()"></i>
            <div id="modal-body" style="padding:2rem;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tffpfvzsxnxzsupuddzc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hInXQ_vVR9K1FPEDyLOR9Q_eJDkVypo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fullData = { history: [], pilotos: [], puntos: [], blacklist: [], summary: {} };
        let activeTab = 'history';

        async function init() {
            lucide.createIcons();
            try {
                const [pRes, sRes, ptsRes, bRes] = await Promise.all([
                    _supabase.from('pilotos').select('*'),
                    _supabase.from('sesiones').select('*').order('end_time', { ascending: false }),
                    _supabase.from('puntos_semanales').select('*'),
                    fetch('blacklist.json').then(r => r.json()).catch(() => [])
                ]);

                fullData.pilotos = pRes.data || [];
                fullData.history = sRes.data || [];
                fullData.puntos = ptsRes.data || [];
                fullData.blacklist = bRes || [];

                populateSelectors();
                
                // Cargar resumen de ganadores para el historial rápido
                const recentIds = fullData.history.slice(0, 30).map(s => s.session_id);
                const { data: winRes } = await _supabase.from('resultados').select('session_id, stage, name, flt, pos').in('session_id', recentIds).eq('pos', 1);
                (winRes || []).forEach(r => {
                    if (!fullData.summary[r.session_id]) fullData.summary[r.session_id] = {};
                    fullData.summary[r.session_id][r.stage] = r;
                });

                document.getElementById('loader').style.display = 'none';
                render();
            } catch (e) { console.error(e); }
        }

        function populateSelectors() {
            const weeks = [...new Set(fullData.history.map(s => s.week))].sort().reverse();
            const wSel = document.getElementById('timeFilter');
            wSel.innerHTML = '<option value="all">Todo el tiempo</option>';
            weeks.forEach(w => wSel.innerHTML += `<option value="${w}">Semana ${w.split('-W')[1] || w}</option>`);

            updateRecordSelectors();
        }

        function updateRecordSelectors(changedType) {
            const tSel = document.getElementById('recordTrack');
            const cSel = document.getElementById('recordCar');
            const selectedTrack = tSel.value;
            const selectedCar = cSel.value;

            // Obtener todas las combinaciones reales de la historia
            const combinations = fullData.history.map(s => ({ t: s.track_name, c: s.car_name }));

            if (changedType === 'track') {
                // Si cambió el circuito, filtramos los coches disponibles para ese circuito
                const availableCars = [...new Set(combinations.filter(x => x.t === selectedTrack).map(x => x.c))].sort();
                cSel.innerHTML = availableCars.map(c => `<option value="${c}" ${c === selectedCar ? 'selected' : ''}>${c}</option>`).join('');
            } else if (changedType === 'car') {
                // Si cambió el coche, filtramos los circuitos disponibles para ese coche
                const availableTracks = [...new Set(combinations.filter(x => x.c === selectedCar).map(x => x.t))].sort();
                tSel.innerHTML = availableTracks.map(t => `<option value="${t}" ${t === selectedTrack ? 'selected' : ''}>${t}</option>`).join('');
            } else {
                // Inicialización: Llenar ambos con todo lo que existe
                const allTracks = [...new Set(combinations.map(x => x.t))].sort();
                const allCars = [...new Set(combinations.map(x => x.c))].sort();
                tSel.innerHTML = allTracks.map(t => `<option value="${t}">${t}</option>`).join('');
                cSel.innerHTML = allCars.map(c => `<option value="${c}">${c}</option>`).join('');
            }
            loadRecords();
        }

        function showTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');
            
            document.getElementById('search-section').style.display = (tab === 'records') ? 'none' : 'block';
            document.getElementById('records-section').style.display = (tab === 'records') ? 'block' : 'none';
            
            if (tab === 'records') loadRecords();
            render();
        }

        function render() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const week = document.getElementById('timeFilter').value;
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (activeTab === 'history') renderHistory(query, week);
            else if (activeTab === 'ranking') renderRanking(query);
            else if (activeTab === 'community') renderCommunity(query);
            else if (activeTab === 'analytics') renderAnalytics();
            else if (activeTab === 'sancionados') renderSancionados(query);
            
            lucide.createIcons();
        }

        function renderHistory(query, week) {
            const container = document.getElementById('content');
            let filtered = fullData.history.filter(s => 
                (s.track_name.toLowerCase().includes(query) || s.car_name.toLowerCase().includes(query)) &&
                (week === 'all' || s.week === week)
            );

            filtered.forEach((s, idx) => {
                const sum = fullData.summary[s.session_id] || {};
                const card = document.createElement('div');
                card.className = 'session-card-pro';
                card.innerHTML = `
                    <div class="session-header" onclick="toggleSession(${idx}, '${s.session_id}')">
                        <div style="flex: 1;">
                            <div style="font-size:0.7rem; color:var(--text-dim);">${s.date} · ${s.time}</div>
                            <div class="track-title">${s.track_name}</div>
                            <div class="car-subtitle">🏎️ ${s.car_name}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="winner-tag">🏆 ${sum.r?.name || '---'}</div>
                            <div class="pole-tag">Pole: ${sum.q?.name || '---'} (${sum.q?.flt || '--:--.---'})</div>
                        </div>
                    </div>
                    <div id="details-${idx}" style="display:none; padding:1.5rem; background:#000;">
                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <button class="nav-btn active" onclick="loadSessionResults('${s.session_id}', 'r', ${idx})">Carrera</button>
                            <button class="nav-btn" onclick="loadSessionResults('${s.session_id}', 'q', ${idx})">Clasificación</button>
                        </div>
                        <div id="table-${idx}"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function loadSessionResults(sid, stage, idx) {
            const cont = document.getElementById(`table-${idx}`);
            cont.innerHTML = '<div class="spinner"></div>';
            const { data } = await _supabase.from('resultados').select('*').eq('session_id', sid).eq('stage', stage).order('pos');
            
            if (!data) { cont.innerHTML = 'Error cargando datos.'; return; }

            // FILTRO ANTI-DUPLICADOS: Solo un resultado por piloto
            const uniqueResults = [];
            const seen = new Set();
            data.forEach(r => {
                if (!seen.has(r.steam_id)) {
                    seen.add(r.steam_id);
                    uniqueResults.push(r);
                }
            });

            let html = '<table class="blogger-table"><thead><tr><th>Pos</th><th>Piloto</th><th>Vuelta</th><th>Incid.</th><th style="text-align:right">Total</th></tr></thead><tbody>';
            uniqueResults.forEach(r => {
                html += `<tr>
                    <td style="font-weight:800; color:${r.pos <= 3 ? 'var(--gold)' : '#fff'}">${r.pos}º</td>
                    <td><b style="cursor:pointer; color:var(--cyan)" onclick="openProfile('${r.steam_id}')">${r.name}</b></td>
                    <td style="color:var(--cyan); font-family:monospace;">${r.flt}</td>
                    <td><span style="color:#f85149">🧱${r.iv || 0}</span> <span style="color:var(--gold)">⚠️${r.c || 0}</span></td>
                    <td style="text-align:right; font-family:monospace; opacity:0.6;">${r.totalt || '--:--.---'}</td>
                </tr>`;
            });
            cont.innerHTML = html + '</tbody></table>';
        }

        async function loadRecords() {
            const track = document.getElementById('recordTrack').value;
            const car = document.getElementById('recordCar').value;
            const container = document.getElementById('content');
            
            if (!track || !car) return;
            
            container.innerHTML = '<div class="spinner" style="margin:2rem auto;"></div>';

            // Encontrar IDs de sesiones que coinciden con esta combinación de pista y coche
            const sessionIds = fullData.history
                .filter(s => s.track_name === track && s.car_name === car)
                .map(s => s.session_id);

            if (sessionIds.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:3rem; opacity:0.5;">No hay sesiones registradas para esta combinación.</p>';
                return;
            }

            // Consultar resultados de esas sesiones específicas
            const { data } = await _supabase.from('resultados')
                .select('*')
                .in('session_id', sessionIds)
                .neq('flt', '--:--.---')
                .order('flt')
                .limit(10);

            if (!data || data.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:3rem; opacity:0.5;">No hay récords con tiempos válidos para esta combinación.</p>';
                return;
            }

            let html = `<h3 style="margin-bottom:1.5rem; color:var(--gold);">🏆 TOP 10 HISTÓRICO: ${track} (${car})</h3>`;
            html += '<table class="blogger-table"><thead><tr><th>#</th><th>Piloto</th><th>Vuelta Rápida</th><th>Fecha</th></tr></thead><tbody>';
            data.forEach((r, i) => {
                const sInfo = fullData.history.find(s => s.session_id == r.session_id) || {};
                html += `<tr>
                    <td style="font-weight:800;">${i+1}º</td>
                    <td><b style="cursor:pointer; color:var(--cyan)" onclick="openProfile('${r.steam_id}')">${r.name}</b></td>
                    <td style="color:var(--cyan); font-weight:800; font-family:monospace;">${r.flt}</td>
                    <td style="opacity:0.5; font-size:0.7rem;">${sInfo.date || '---'}</td>
                </tr>`;
            });
            container.innerHTML = html + '</tbody></table>';
        }

        async function openProfile(sid) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            modal.classList.add('active');
            body.innerHTML = '<div class="spinner"></div>';

            const p = fullData.pilotos.find(x => x.steam_id === sid) || {};
            const pts = fullData.puntos.filter(x => x.steam_id === sid);
            const totalPts = pts.reduce((sum, x) => sum + (x.puntos || 0), 0);
            const totalRaces = pts.reduce((sum, x) => sum + (x.carreras || 0), 0);
            const sr = p.vueltas_totales > 0 ? Math.round((p.vueltas_limpias / p.vueltas_totales) * 100) : 0;

            body.innerHTML = `
                <div style="display:flex; gap:2rem; align-items:center; margin-bottom:2rem;">
                    <img src="https://avatar.steam-id.com/${sid}.png" 
                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre)}&background=random&color=fff&bold=true'"
                         style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); object-fit:cover;">
                    <div>
                        <h2 style="font-size:2rem; font-weight:800;">${p.nombre || 'Piloto'}</h2>
                        <div style="color:var(--text-dim); font-size:0.8rem;">ID: ${sid}</div>
                        <div style="margin-top:10px;">
                            ${p.es_admin ? '<span class="badge" style="background:#3fb1ff; color:#000;">ADMIN</span>' : ''}
                            ${p.es_socio ? '<span class="badge" style="background:var(--gold); color:#000;">SOCIO</span>' : ''}
                        </div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:1rem; margin-bottom:2rem;">
                    <div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:12px; text-align:center;">
                        <div style="font-size:1.5rem; font-weight:800; color:var(--gold);">${totalPts}</div>
                        <div style="font-size:0.6rem; color:var(--text-dim); text-transform:uppercase;">Puntos</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:12px; text-align:center;">
                        <div style="font-size:1.5rem; font-weight:800;">${totalRaces}</div>
                        <div style="font-size:0.6rem; color:var(--text-dim); text-transform:uppercase;">Carreras</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:12px; text-align:center;">
                        <div style="font-size:1.5rem; font-weight:800; color:var(--cyan);">${sr}%</div>
                        <div style="font-size:0.6rem; color:var(--text-dim); text-transform:uppercase;">Seguridad</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:12px; text-align:center;">
                        <div style="font-size:1.5rem; font-weight:800;">${p.veces_conectado || 0}</div>
                        <div style="font-size:0.6rem; color:var(--text-dim); text-transform:uppercase;">Ingresos</div>
                    </div>
                </div>
                <h4 style="color:var(--accent); margin-bottom:1rem;">HISTORIAL RECIENTE</h4>
                <div id="profile-history">Cargando historial...</div>
            `;
            
            const { data: recent } = await _supabase.from('resultados').select('pos, flt, session_id').eq('steam_id', sid).order('session_id', { ascending: false }).limit(10);
            
            let histHtml = '<table class="blogger-table"><tbody>';
            const uniqueRecent = [];
            const seenSids = new Set();
            (recent || []).forEach(r => {
                if (!seenSids.has(r.session_id)) {
                    seenSids.add(r.session_id);
                    uniqueRecent.push(r);
                }
            });

            uniqueRecent.slice(0, 5).forEach(r => {
                const sInfo = fullData.history.find(s => s.session_id == r.session_id) || { track_name: 'Carrera Antigua', car_name: '---' };
                histHtml += `<tr>
                    <td><div style="font-weight:700;">${sInfo.track_name}</div><div style="font-size:0.6rem; opacity:0.5;">${sInfo.car_name}</div></td>
                    <td style="font-weight:800; color:var(--gold);">${r.pos}º</td>
                    <td style="color:var(--cyan); font-family:monospace;">${r.flt}</td>
                </tr>`;
            });
            document.getElementById('profile-history').innerHTML = histHtml + '</tbody></table>';
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function toggleSession(idx, sid) {
            const el = document.getElementById(`details-${idx}`);
            el.style.display = (el.style.display === 'none') ? 'block' : 'none';
            if (el.style.display === 'block') loadSessionResults(sid, 'r', idx);
        }

        function renderRanking(query) {
            const container = document.getElementById('content');
            const ranking = fullData.pilotos.map(p => {
                const pData = fullData.puntos.filter(pts => pts.steam_id === p.steam_id);
                return { ...p, pts: pData.reduce((sum, x) => sum + (x.puntos || 0), 0), races: pData.reduce((sum, x) => sum + (x.carreras || 0), 0) };
            }).filter(p => p.pts > 0 && p.nombre.toLowerCase().includes(query)).sort((a,b) => b.pts - a.pts);

            ranking.forEach(p => {
                const card = document.createElement('div');
                card.className = 'list-item';
                card.onclick = () => openProfile(p.steam_id);
                card.innerHTML = `<img src="https://avatar.steam-id.com/${p.steam_id}.png" 
                                       onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre)}&background=random&color=fff'"
                                       style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <div><div style="font-weight:800; color:#fff;">${p.nombre}</div><div style="font-size:0.7rem; color:var(--text-dim);">ID: ${p.steam_id}</div></div>
                    <div><div style="font-weight:900; color:var(--gold); text-align:center;">${p.pts}</div><div style="font-size:0.6rem; color:var(--text-dim); text-align:center;">PUNTOS</div></div>
                    <div><div style="font-weight:800; text-align:center;">${p.races}</div><div style="font-size:0.6rem; color:var(--text-dim); text-align:center;">CARRERAS</div></div>
                    <i data-lucide="chevron-right" style="opacity:0.3"></i>`;
                container.appendChild(card);
            });
        }

        function renderCommunity(query) {
            const container = document.getElementById('content');
            const filtered = fullData.pilotos.filter(p => p.nombre.toLowerCase().includes(query)).sort((a,b) => (b.veces_conectado || 0) - (a.veces_conectado || 0));
            let html = '<table class="tech-table" style="width:100%; border-collapse:collapse;"><thead><tr style="color:var(--text-dim); font-size:0.8rem; text-align:left;"><th style="padding:1rem;">Piloto</th><th>SR</th><th>Vueltas</th><th>Actividad</th></tr></thead><tbody>';
            filtered.slice(0, 50).forEach(p => {
                const sr = p.vueltas_totales > 0 ? Math.round((p.vueltas_limpias / p.vueltas_totales) * 100) : 0;
                html += `<tr style="border-bottom:1px solid var(--border); cursor:pointer;" onclick="openProfile('${p.steam_id}')">
                    <td style="padding:1rem; display:flex; align-items:center; gap:10px;">
                        <img src="https://avatar.steam-id.com/${p.steam_id}.png" 
                             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre)}&background=random&color=fff'"
                             style="width:24px; height:24px; border-radius:50%; object-fit:cover;">
                        ${p.nombre}
                    </td>
                    <td><span class="badge" style="background:${sr > 80 ? '#238636' : '#f85149'}">${sr}%</span></td>
                    <td style="opacity:0.6;">${p.vueltas_totales}</td>
                    <td style="font-size:0.7rem;">${p.ultima_conexion || '---'}</td>
                </tr>`;
            });
            container.appendChild(Object.assign(document.createElement('div'), { innerHTML: html + '</tbody></table>' }));
        }

        function renderAnalytics() {
            const container = document.getElementById('content');
            container.innerHTML = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;"><canvas id="c1"></canvas><canvas id="c2"></canvas></div>';
            const wData = {}; fullData.history.forEach(s => wData[s.week] = (wData[s.week] || 0) + 1);
            new Chart(document.getElementById('c1'), { type:'line', data:{ labels:Object.keys(wData), datasets:[{label:'Carreras', data:Object.values(wData), borderColor:'#b314da'}] } });
            const tData = {}; fullData.history.forEach(s => tData[s.track_name] = (tData[s.track_name] || 0) + 1);
            const topT = Object.entries(tData).sort((a,b)=>b[1]-a[1]).slice(0,5);
            new Chart(document.getElementById('c2'), { type:'bar', data:{ labels:topT.map(x=>x[0]), datasets:[{label:'Uso', data:topT.map(x=>x[1]), backgroundColor:'#00ffcc'}] } });
        }

        function renderSancionados(query) {
            const container = document.getElementById('content');
            const banned = fullData.pilotos.filter(p => fullData.blacklist.includes(p.steam_id) && p.nombre.toLowerCase().includes(query));
            if (banned.length === 0) { container.innerHTML = '<div style="text-align:center; padding:4rem;"><i data-lucide="check-circle" style="color:var(--cyan); width:50px; height:50px;"></i><h3>SIN SANCIONES</h3></div>'; return; }
            banned.forEach(p => {
                const card = document.createElement('div');
                card.className = 'list-item'; card.style.border = '1px solid #f85149';
                card.innerHTML = `<img src="https://avatar.steam-id.com/${p.steam_id}.png" 
                                       onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nombre)}&background=f85149&color=fff'"
                                       style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                  <div><div style="color:#f85149; font-weight:800;">${p.nombre}</div></div><div>BLACKLIST</div><i data-lucide="alert-triangle" style="color:#f85149"></i>`;
                container.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
