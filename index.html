<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNES HUB - Central de Datos 24/7</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: #161b22;
            --accent: #b314da;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --border: #30363d;
            --gold: #ffcc00;
            --cyan: #00ffcc;
        }

        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); padding: 1rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); }
        
        main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .search-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; }
        .search-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 1.1rem; outline: none; }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 2rem; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .item-card { background: var(--card-bg); border: 1px solid var(--border); padding: 1rem 1.5rem; border-radius: 12px; display: grid; grid-template-columns: 50px 1fr 100px 100px auto; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .item-card:hover { border-color: var(--accent); transform: scale(1.01); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #222; }
        .name { font-weight: 800; font-size: 1.1rem; }
        .val { font-weight: 900; color: var(--accent); font-size: 1.2rem; text-align: center; }
        .label { font-size: 0.7rem; color: var(--text-dim); text-align: center; text-transform: uppercase; }

        .session-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; }
        .session-head { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .track-name { font-weight: 800; font-size: 1.2rem; }
        .winner { color: var(--gold); font-weight: 800; }

        #loader { text-align: center; padding: 4rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo"><i data-lucide="database"></i> UNES<span>HUB</span></div>
    <div style="font-size: 0.8rem; color: var(--text-dim);">CLOUD EDITION 24/7</div>
</header>

<main>
    <div class="search-box">
        <i data-lucide="search" style="color:var(--text-dim)"></i>
        <input type="text" id="searchInput" placeholder="Buscar piloto, circuito o coche..." oninput="render()">
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="tab-ranking" onclick="setTab('ranking')">CLASIFICACIÓN</button>
        <button class="tab-btn" id="tab-history" onclick="setTab('history')">HISTORIAL</button>
        <button class="tab-btn" id="tab-community" onclick="setTab('community')">COMUNIDAD</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p>Conectando con Supabase Cloud...</p>
    </div>

    <div id="content" class="list-container"></div>
</main>

<script>
    const SUPABASE_URL = "https://tffpfvzsxnxzsupuddzc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_hInXQ_vVR9K1FPEDyLOR9Q_eJDkVypo";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let activeTab = 'ranking';
    let fullData = { pilotos: [], history: [] };

    async function init() {
        lucide.createIcons();
        try {
            // Cargar Pilotos
            const { data: pData } = await _supabase.from('pilotos').select('*');
            fullData.pilotos = pData || [];

            // Cargar Puntos de la última semana (simplificado para el HUB)
            const { data: ptsData } = await _supabase.from('puntos_semanales').select('*');
            // Mapear puntos a los pilotos
            fullData.pilotos.forEach(p => {
                const userPts = ptsData.filter(x => x.steam_id === p.steam_id);
                p.total_puntos = userPts.reduce((sum, x) => sum + (x.puntos || 0), 0);
                p.total_races = userPts.reduce((sum, x) => sum + (x.carreras || 0), 0);
            });

            // Cargar Sesiones
            const { data: sData } = await _supabase.from('sesiones').select('*').order('end_time', { ascending: false }).limit(50);
            fullData.history = sData || [];

            document.getElementById('loader').style.display = 'none';
            render();
        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerHTML = "Error cargando datos de la nube.";
        }
    }

    function setTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        render();
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (activeTab === 'ranking') {
            let filtered = fullData.pilotos
                .filter(p => p.total_puntos > 0 && p.nombre.toLowerCase().includes(query))
                .sort((a,b) => b.total_puntos - a.total_puntos);

            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <div class="avatar" style="background: url('https://unavatar.io/steam/${p.steam_id}') center/cover"></div>
                    <div>
                        <div class="name" style="color:${p.es_socio ? 'var(--gold)' : (p.es_admin ? '#3fb1ff' : '#fff')}">${p.nombre}</div>
                        <div style="font-size:0.7rem; color:var(--text-dim)">ID: ${p.steam_id}</div>
                    </div>
                    <div><div class="val">${p.total_puntos}</div><div class="label">Puntos</div></div>
                    <div><div class="val">${p.total_races}</div><div class="label">Carreras</div></div>
                    <i data-lucide="chevron-right" style="opacity:0.3"></i>
                `;
                container.appendChild(div);
            });
        } else if (activeTab === 'history') {
            let filtered = fullData.history.filter(s => s.track_name.toLowerCase().includes(query) || s.car_name.toLowerCase().includes(query));
            filtered.forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-card';
                div.innerHTML = `
                    <div class="session-head">
                        <div>
                            <div style="font-size:0.7rem; color:var(--text-dim)">${s.date} · ${s.time}</div>
                            <div class="track-name">${s.track_name}</div>
                            <div style="font-size:0.8rem; color:var(--cyan)">🏎️ ${s.car_name}</div>
                        </div>
                        <i data-lucide="calendar" style="opacity:0.2"></i>
                    </div>
                `;
                container.appendChild(div);
            });
        } else if (activeTab === 'community') {
            let filtered = fullData.pilotos.filter(p => p.nombre.toLowerCase().includes(query));
            filtered.forEach(p => {
                const sr = p.vueltas_totales > 0 ? Math.round((p.vueltas_limpias / p.vueltas_totales) * 100) : 0;
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <div class="avatar" style="background: url('https://unavatar.io/steam/${p.steam_id}') center/cover"></div>
                    <div class="name">${p.nombre}</div>
                    <div><div class="val" style="color:${sr > 80 ? 'var(--cyan)' : '#f85149'}">${sr}%</div><div class="label">Limpieza</div></div>
                    <div><div class="val" style="color:var(--text-dim)">${p.vueltas_totales}</div><div class="label">Vueltas</div></div>
                    <i data-lucide="shield" style="opacity:0.3"></i>
                `;
                container.appendChild(div);
            });
        }
        lucide.createIcons();
    }

    init();
</script>
</body>
</html>
