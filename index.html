<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNES HUB - Central de Datos Cloud 24/7</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --accent: #b314da;
            --accent-hover: #d11aff;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --header-bg: rgba(0, 0, 0, 0.8);
            --border: #222222;
            --gold: #ffcc00;
            --cyan: #00ffcc;
            --modal-bg: rgba(0, 0, 0, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            position: sticky; top: 0;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .logo { display:flex; align-items:center; gap:0.8rem; font-size:1.5rem; font-weight:800; color:#fff; }
        .logo span { color: var(--accent); }

        nav { display: flex; gap: 0.5rem; }
        .nav-btn {
            background: transparent; border: none; color: var(--text-dim);
            font-family: inherit; font-size: 0.85rem; cursor: pointer;
            padding: 0.5rem 0.8rem; border-bottom: 2px solid transparent;
            transition: 0.3s; display: flex; align-items: center; gap: 0.4rem;
            font-weight: 600;
        }
        .nav-btn:hover, .nav-btn.active { color: #fff; border-bottom-color: var(--accent); }

        main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; min-height: 80vh; }

        .search-box {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 2rem;
            display: flex; gap: 1rem; align-items: center;
        }
        .search-box input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-family: inherit; font-size: 1.1rem; outline: none;
        }

        .session-card-pro {
            background: #141418; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 1rem; overflow: hidden;
        }
        .session-header {
            padding: 1.2rem; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); cursor: pointer;
        }
        .session-header:hover { background: rgba(255,255,255,0.05); }
        
        .track-title { font-size: 1.2rem; font-weight: 800; color: #fff; }
        .car-subtitle { font-size: 0.85rem; color: var(--cyan); font-weight: 600; }
        .winner-tag { color: var(--gold); font-weight: 800; }

        .blogger-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 10px; }
        .blogger-table th { border-bottom: 1px solid var(--border); padding: 10px; text-align: left; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        .blogger-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .list-item-row:hover { background: rgba(255,255,255,0.03); cursor: pointer; }

        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        #modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 800px;
            max-height: 90vh; overflow-y: auto; border-radius: 20px;
            border: 1px solid var(--border); position: relative; padding: 2rem;
        }
        .modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #fff; }

        .records-selectors { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .selector-box { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem; }
        .selector-box label { display: block; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .selector-box select { width: 100%; background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1rem; outline: none; }

        .badge { font-weight: 800; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .nav-btn span { display: none; }
            .records-selectors { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i data-lucide="shield-check"></i> UNES<span>HUB</span></div>
        <nav>
            <button class="nav-btn active" id="btn-history" onclick="showTab('history')"><i data-lucide="calendar"></i> <span>Carreras</span></button>
            <button class="nav-btn" id="btn-records" onclick="showTab('records')"><i data-lucide="gauge"></i> <span>Récords</span></button>
            <button class="nav-btn" id="btn-ranking" onclick="showTab('ranking')"><i data-lucide="trophy"></i> <span>Ranking</span></button>
            <button class="nav-btn" id="btn-analytics" onclick="showTab('analytics')"><i data-lucide="bar-chart-3"></i> <span>Stats</span></button>
            <button class="nav-btn" id="btn-sancionados" onclick="showTab('sancionados')"><i data-lucide="user-x"></i> <span>Baneados</span></button>
        </nav>
    </header>

    <main>
        <div id="search-section">
            <div class="search-box">
                <i data-lucide="search" style="color: var(--text-dim)"></i>
                <input type="text" id="mainSearch" placeholder="Buscar..." oninput="render()">
                <select id="resultsLimit" onchange="render()" style="background:transparent; color:#fff; border:1px solid var(--border); padding:5px; border-radius:5px;">
                    <option value="20">Ver 20</option>
                    <option value="50">Ver 50</option>
                    <option value="100">Ver 100</option>
                    <option value="9999">Todos</option>
                </select>
            </div>
        </div>

        <div id="records-section" style="display:none;">
            <div class="records-selectors">
                <div class="selector-box"><label>Circuito</label><select id="recordTrack" onchange="updateRecordSelectors('track')"></select></div>
                <div class="selector-box"><label>Coche</label><select id="recordCar" onchange="updateRecordSelectors('car')"></select></div>
            </div>
        </div>

        <div id="loader" style="text-align:center; padding:5rem;"><div class="spinner"></div><p style="margin-top:1rem; opacity:0.5;">Sincronizando con la nube...</p></div>
        <div id="content"></div>
    </main>

    <div id="modal"><div class="modal-content"><i data-lucide="x" class="modal-close" onclick="closeModal()"></i><div id="modal-body"></div></div></div>

    <script>
        const SUPABASE_URL = "https://tffpfvzsxnxzsupuddzc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hInXQ_vVR9K1FPEDyLOR9Q_eJDkVypo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fullData = { history: [], pilotos: [], puntos: [], summary: {}, blacklist: [] };
        let activeTab = 'history';
        let sortConfig = { col: 'pts', dir: 'desc' };

        async function init() {
            lucide.createIcons();
            try {
                // Cargar datos y blacklist en paralelo
                const [pRes, sRes, ptsRes, blRes] = await Promise.all([
                    _supabase.from('pilotos').select('*'),
                    _supabase.from('sesiones').select('*').order('end_time', { ascending: false }),
                    _supabase.from('puntos_semanales').select('*'),
                    fetch('blacklist.json').then(r => r.json()).catch(() => [])
                ]);
                fullData.pilotos = pRes.data || [];
                fullData.history = sRes.data || [];
                fullData.puntos = ptsRes.data || [];
                fullData.blacklist = blRes || [];

                populateSelectors();
                document.getElementById('loader').style.display = 'none';
                setInterval(lazyLoadAvatars, 2000);
                render();

                // Ganadores en background
                const recentIds = fullData.history.slice(0, 20).map(s => s.session_id);
                const { data: winRes } = await _supabase.from('resultados').select('session_id, stage, name, pos').in('session_id', recentIds).eq('pos', 1);
                (winRes || []).forEach(r => {
                    if (!fullData.summary[r.session_id]) fullData.summary[r.session_id] = {};
                    fullData.summary[r.session_id][r.stage] = r;
                });
                if (activeTab === 'history') render();
            } catch (e) { console.error(e); }
        }

        function populateSelectors() {
            const tSel = document.getElementById('recordTrack');
            const cSel = document.getElementById('recordCar');
            if(!tSel || !cSel) return;
            const combos = fullData.history.map(s => ({ t: s.track_name, c: s.car_name }));
            const tracks = [...new Set(combos.map(x => x.t))].sort();
            const cars = [...new Set(combos.map(x => x.c))].sort();
            tSel.innerHTML = tracks.map(t => `<option value="${t}">${t}</option>`).join('');
            cSel.innerHTML = cars.map(c => `<option value="${c}">${c}</option>`).join('');
            if(activeTab === 'records') loadRecords();
        }

        function updateRecordSelectors(type) {
            const tSel = document.getElementById('recordTrack');
            const cSel = document.getElementById('recordCar');
            const selectedTrack = tSel.value;
            const selectedCar = cSel.value;
            const combos = fullData.history.map(s => ({ t: s.track_name, c: s.car_name }));

            if (type === 'track') {
                const filteredCars = [...new Set(combos.filter(x => x.t === selectedTrack).map(x => x.c))].sort();
                cSel.innerHTML = filteredCars.map(c => `<option value="${c}" ${c === selectedCar ? 'selected' : ''}>${c}</option>`).join('');
            } else if (type === 'car') {
                const filteredTracks = [...new Set(combos.filter(x => x.c === selectedCar).map(x => x.t))].sort();
                tSel.innerHTML = filteredTracks.map(t => `<option value="${t}" ${t === selectedTrack ? 'selected' : ''}>${t}</option>`).join('');
            }
            if (activeTab === 'records') loadRecords();
        }

        function timeAgo(dateString) {
            if (!dateString) return '---';
            try {
                const parts = dateString.split(/[\/\s:]/);
                const date = new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0);
                const diff = (new Date() - date) / 1000;
                if (diff < 3600) return `Hace ${Math.floor(diff/60)}m`;
                if (diff < 86400) return `Hace ${Math.floor(diff/3600)}h`;
                return `Hace ${Math.floor(diff/86400)}d`;
            } catch(e) { return dateString; }
        }

        function showTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');
            document.getElementById('search-section').style.display = (tab === 'analytics' || tab === 'records') ? 'none' : 'block';
            document.getElementById('records-section').style.display = (tab === 'records') ? 'block' : 'none';
            render();
        }

        function sortTable(col) {
            if (sortConfig.col === col) sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
            else { sortConfig.col = col; sortConfig.dir = 'desc'; }
            render();
        }

        function render() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const limit = parseInt(document.getElementById('resultsLimit').value) || 20;
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (activeTab === 'history') renderHistory(query);
            else if (activeTab === 'ranking') renderRanking(query, limit);
            else if (activeTab === 'analytics') renderAnalytics();
            else if (activeTab === 'records') loadRecords();
            else if (activeTab === 'sancionados') renderSancionados(query);
            lucide.createIcons();
        }

        function renderHistory(query) {
            const filtered = fullData.history.filter(s => s.track_name.toLowerCase().includes(query) || s.car_name.toLowerCase().includes(query));
            let html = '';
            filtered.forEach((s, idx) => {
                const sum = fullData.summary[s.session_id] || {};
                html += `
                <div class="session-card-pro">
                    <div class="session-header" onclick="toggleSession(${idx}, '${s.session_id}')">
                        <div>
                            <div style="font-size:0.7rem; color:var(--text-dim);">${s.date}</div>
                            <div class="track-title">${s.track_name}</div>
                            <div class="car-subtitle">🏎️ ${s.car_name}</div>
                        </div>
                        <div class="winner-tag">🏆 ${sum.r ? sum.r.name : '---'}</div>
                    </div>
                    <div id="details-${idx}" style="display:none; padding:1.5rem; border-top:1px solid var(--border); background:rgba(0,0,0,0.2);">
                        <div style="display:flex; gap:10px; margin-bottom:1rem;">
                            <button class="nav-btn active" id="btn-r-${idx}" onclick="loadResults('${s.session_id}', 'r', ${idx})">Carrera</button>
                            <button class="nav-btn" id="btn-q-${idx}" onclick="loadResults('${s.session_id}', 'q', ${idx})">Clasificación</button>
                        </div>
                        <div id="table-${idx}"></div>
                    </div>
                </div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        async function loadResults(sid, stage, idx) {
            const cont = document.getElementById(`table-${idx}`);
            cont.innerHTML = '<div class="spinner"></div>';
            const { data } = await _supabase.from('resultados').select('*').eq('session_id', sid).eq('stage', stage).order('pos');
            if (!data) return;
            let html = '<table class="blogger-table"><thead><tr><th>Pos</th><th>Piloto</th><th>Vuelta</th><th>🧱</th><th style="text-align:right">Total</th></tr></thead><tbody>';
            data.forEach(r => {
                html += `<tr><td>${r.pos}º</td><td><b onclick="openProfile('${r.steam_id}')" style="cursor:pointer; color:var(--cyan)">${r.name}</b></td><td>${r.flt}</td><td>${r.iv||0}</td><td style="text-align:right; opacity:0.6;">${r.totalt||'--'}</td></tr>`;
            });
            cont.innerHTML = html + '</tbody></table>';
        }

        function renderRanking(query, limit) {
            const pilotos = fullData.pilotos.filter(p => p.nombre.toLowerCase().includes(query)).map(p => {
                const pInfo = fullData.puntos.filter(pt => pt.steam_id === p.steam_id);
                const pts = pInfo.reduce((s, x) => s + (x.puntos || 0), 0);
                const races = pInfo.reduce((s, x) => s + (x.carreras || 0), 0);
                const sr = p.vueltas_totales > 0 ? Math.round((p.vueltas_limpias / p.vueltas_totales) * 100) : 0;
                const parts = (p.ultima_conexion || '01/01/2000 00:00:00').split(/[\/\s:]/);
                const dateVal = new Date(parts[2], parts[1]-1, parts[0], parts[3]||0, parts[4]||0).getTime();
                return { ...p, pts, races, sr, dateVal };
            }).sort((a, b) => {
                const dir = sortConfig.dir === 'asc' ? 1 : -1;
                if (sortConfig.col === 'nombre') return a.nombre.localeCompare(b.nombre) * dir;
                if (sortConfig.col === 'actividad') return (a.dateVal - b.dateVal) * dir;
                return (a[sortConfig.col] - b[sortConfig.col]) * dir;
            }).slice(0, limit);

            const getIcon = (c) => sortConfig.col === c ? (sortConfig.dir === 'asc' ? '↑' : '↓') : '↕';

            let html = `<table class="blogger-table"><thead><tr>
                <th>Pos</th>
                <th onclick="sortTable('nombre')" style="cursor:pointer;">Piloto ${getIcon('nombre')}</th>
                <th onclick="sortTable('sr')" style="cursor:pointer; text-align:center;">SR ${getIcon('sr')}</th>
                <th onclick="sortTable('vueltas_totales')" style="cursor:pointer; text-align:center;">Vueltas ${getIcon('vueltas_totales')}</th>
                <th onclick="sortTable('pts')" style="cursor:pointer; text-align:center;">Puntos ${getIcon('pts')}</th>
                <th onclick="sortTable('races')" style="cursor:pointer; text-align:center;">Carreras ${getIcon('races')}</th>
                <th onclick="sortTable('actividad')" style="cursor:pointer; text-align:center;">Actividad ${getIcon('actividad')}</th>
            </tr></thead><tbody>`;

            pilotos.forEach((p, i) => {
                const posCol = i === 0 ? 'var(--gold)' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : 'inherit';
                html += `
                <tr class="list-item-row" onclick="openProfile('${p.steam_id}')">
                    <td style="color:${posCol}; font-weight:900;">#${i+1}</td>
                    <td style="display:flex; align-items:center; gap:10px;">
                        <img src="${p.avatar_url || 'https://avatars.akamai.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'}" data-sid="${p.steam_id}" ${!p.avatar_url ? 'data-pending="true"' : ''} style="width:25px; height:25px; border-radius:50%; opacity:0.7;">
                        <span style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.nombre}</span>
                    </td>
                    <td style="text-align:center;"><span class="badge" style="background:${p.sr > 80 ? '#238636' : '#f85149'}">${p.sr}%</span></td>
                    <td style="text-align:center; opacity:0.6;">${p.vueltas_totales}</td>
                    <td style="text-align:center; color:var(--gold); font-weight:800;">${p.pts}</td>
                    <td style="text-align:center; opacity:0.6;">${p.races}</td>
                    <td style="text-align:center; font-size:0.7rem; color:var(--text-dim);" title="${p.ultima_conexion}">${timeAgo(p.ultima_conexion)}</td>
                </tr>`;
            });
            document.getElementById('content').innerHTML = html + '</tbody></table>';
        }

        async function loadRecords() {
            const tSel = document.getElementById('recordTrack');
            const cSel = document.getElementById('recordCar');
            if(!tSel || !cSel) return;
            const track = tSel.value;
            const car = cSel.value;
            const container = document.getElementById('content');
            if (!track || !car) return;
            container.innerHTML = '<div class="spinner"></div>';
            const sids = fullData.history.filter(s => s.track_name === track && s.car_name === car).map(s => s.session_id);
            if (sids.length === 0) { container.innerHTML = '<p style="text-align:center; padding:3rem; opacity:0.5;">No hay sesiones registradas.</p>'; return; }
            const { data } = await _supabase.from('resultados').select('*').in('session_id', sids).neq('flt', '--:--.---').neq('flt', '0:00.000').order('flt').limit(100);
            if (!data || data.length === 0) { container.innerHTML = '<p style="text-align:center; padding:3rem; opacity:0.5;">No hay récords válidos.</p>'; return; }
            let html = `<h3 style="margin-bottom:1.5rem; color:var(--gold);">🏆 TOP 100: ${track}</h3><table class="blogger-table"><thead><tr><th>#</th><th>Piloto</th><th>Vuelta Rápida</th><th>Fecha</th></tr></thead><tbody>`;
            data.forEach((r, i) => {
                const sInfo = fullData.history.find(s => s.session_id == r.session_id) || {};
                html += `<tr><td style="font-weight:800;">${i+1}º</td><td><b onclick="openProfile('${r.steam_id}')" style="cursor:pointer; color:var(--cyan)">${r.name}</b></td><td style="color:var(--cyan); font-weight:800; font-family:monospace;">${r.flt}</td><td style="opacity:0.5; font-size:0.7rem;">${sInfo.date || '---'}</td></tr>`;
            });
            container.innerHTML = html + '</tbody></table>';
        }

        function renderAnalytics() {
            const container = document.getElementById('content');
            const totalRaces = fullData.history.length;
            const uniquePilots = fullData.pilotos.length;
            const totalLaps = fullData.pilotos.reduce((s, p) => s + (p.vueltas_totales || 0), 0);
            const cars = {}; fullData.history.forEach(s => cars[s.car_name] = (cars[s.car_name] || 0) + 1);
            const topCars = Object.entries(cars).sort((a,b) => b[1]-a[1]).slice(0, 5);
            const last7 = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }); }).reverse();
            const days = {}; last7.forEach(d => days[d] = 0);
            fullData.history.forEach(s => { const d = s.date.split(' ')[0].substring(0, 5); if (days[d] !== undefined) days[d]++; });
            
            container.innerHTML = `
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:1rem; margin-bottom:2rem;">
                <div class="session-card-pro" style="padding:1.5rem; text-align:center;"><div style="font-size:0.7rem; color:var(--text-dim);">CARRERAS</div><div style="font-size:2rem; font-weight:900; color:var(--accent);">${totalRaces}</div></div>
                <div class="session-card-pro" style="padding:1.5rem; text-align:center;"><div style="font-size:0.7rem; color:var(--text-dim);">VUELTAS ACUM.</div><div style="font-size:2rem; font-weight:900; color:var(--gold);">${totalLaps}</div></div>
                <div class="session-card-pro" style="padding:1.5rem; text-align:center;"><div style="font-size:0.7rem; color:var(--text-dim);">PILOTOS</div><div style="font-size:2rem; font-weight:900; color:var(--cyan);">${uniquePilots}</div></div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:2rem;">
                <div class="session-card-pro" style="padding:1.5rem;"><h3 style="font-size:0.8rem; margin-bottom:1rem;">ACTIVIDAD SEMANAL</h3><canvas id="chartActivity" height="200"></canvas></div>
                <div class="session-card-pro" style="padding:1.5rem;"><h3 style="font-size:0.8rem; margin-bottom:1rem;">TOP 5 VEHÍCULOS</h3><canvas id="chartCars" height="200"></canvas></div>
            </div>`;
            
            new Chart(document.getElementById('chartActivity'), { type: 'line', data: { labels: last7, datasets: [{ label: 'Sesiones', data: last7.map(d => days[d]), borderColor: '#b314da', backgroundColor: 'rgba(179, 20, 218, 0.1)', fill: true, tension: 0.4 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } } });
            new Chart(document.getElementById('chartCars'), { type: 'doughnut', data: { labels: topCars.map(c => c[0]), datasets: [{ data: topCars.map(c => c[1]), backgroundColor: ['#ff7b72', '#a5d6ff', '#ffa657', '#7ee787', '#d2a8ff'], borderWidth: 0 }] }, options: { plugins: { legend: { position: 'right', labels: { color: '#fff', boxWidth: 10, font: { size: 10 } } } } } });
        }

        function renderSancionados(query) {
            const container = document.getElementById('content');
            const banned = fullData.pilotos.filter(p => (fullData.blacklist.includes(p.steam_id) || p.esta_baneado || p.baneado) && p.nombre.toLowerCase().includes(query));
            if (banned.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:5rem; opacity:0.5;"><i data-lucide="check-circle" style="color:var(--cyan); width:48px; height:48px; margin-bottom:1rem;"></i><p>No hay pilotos sancionados actualmente.</p></div>';
                lucide.createIcons();
                return;
            }
            banned.forEach(p => {
                const card = document.createElement('div');
                card.className = 'session-card-pro'; card.style.padding = '1.2rem'; card.style.borderLeft = '4px solid #f85149';
                card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <img src="${p.avatar_url || 'https://avatars.akamai.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'}" style="width:45px; height:45px; border-radius:50%; border:2px solid #f85149; opacity:0.6;">
                        <div>
                            <b style="font-size:1.1rem; color:#fff;">${p.nombre}</b>
                            <div style="color:#f85149; font-size:0.65rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">Acceso Denegado / Blacklist</div>
                        </div>
                    </div>
                    <i data-lucide="shield-alert" style="color:#f85149; width:24px; height:24px;"></i>
                </div>`;
                container.appendChild(card);
            });
        }

        async function openProfile(sid) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            modal.classList.add('active');
            body.innerHTML = '<div class="spinner"></div>';
            const p = fullData.pilotos.find(x => x.steam_id === sid) || {};
            const pts = fullData.puntos.filter(x => x.steam_id === sid);
            const totalPts = pts.reduce((sum, x) => sum + (x.puntos || 0), 0);
            const sr = p.vueltas_totales > 0 ? Math.round((p.vueltas_limpias / p.vueltas_totales) * 100) : 0;
            body.innerHTML = `
                <div style="display:flex; gap:1.5rem; align-items:center; margin-bottom:2rem;">
                    <img src="${p.avatar_url || 'https://avatars.akamai.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'}" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);">
                    <div><h2 style="font-weight:800;">${p.nombre}</h2><div style="font-size:0.8rem; opacity:0.5;">ID: ${sid}</div></div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:1rem; margin-bottom:2rem;">
                    <div style="text-align:center; background:rgba(255,255,255,0.03); padding:1rem; border-radius:10px;"><div style="color:var(--gold); font-weight:900; font-size:1.5rem;">${totalPts}</div><div style="font-size:0.6rem; opacity:0.5;">PUNTOS</div></div>
                    <div style="text-align:center; background:rgba(255,255,255,0.03); padding:1rem; border-radius:10px;"><div style="font-weight:900; font-size:1.5rem;">${p.vueltas_totales}</div><div style="font-size:0.6rem; opacity:0.5;">VUELTAS</div></div>
                    <div style="text-align:center; background:rgba(255,255,255,0.03); padding:1rem; border-radius:10px;"><div style="color:var(--cyan); font-weight:900; font-size:1.5rem;">${sr}%</div><div style="font-size:0.6rem; opacity:0.5;">SR</div></div>
                </div>
                <h4 style="color:var(--accent); margin-bottom:1rem; font-size:0.8rem;">CARRERAS RECIENTES</h4>
                <div id="profile-history"></div>`;
            
            const { data: recent } = await _supabase.from('resultados').select('pos, flt, session_id').eq('steam_id', sid).order('session_id', { ascending: false }).limit(5);
            let histHtml = '<table class="blogger-table"><tbody>';
            (recent || []).forEach(r => {
                const sInfo = fullData.history.find(s => s.session_id == r.session_id) || { track_name: 'Sesión Antigua', car_name: '---' };
                histHtml += `<tr><td><div style="font-weight:700; font-size:0.8rem;">${sInfo.track_name}</div></td><td style="font-weight:800; color:var(--gold);">${r.pos}º</td><td style="color:var(--cyan); font-family:monospace; font-size:0.75rem;">${r.flt}</td></tr>`;
            });
            document.getElementById('profile-history').innerHTML = histHtml + '</tbody></table>';
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function toggleSession(idx, sid) {
            const el = document.getElementById(`details-${idx}`);
            const isHidden = el.style.display === 'none';
            document.querySelectorAll('[id^="details-"]').forEach(d => d.style.display = 'none');
            el.style.display = isHidden ? 'block' : 'none';
            if (isHidden) loadResults(sid, 'r', idx);
        }

        async function lazyLoadAvatars() {
            const imgs = document.querySelectorAll('img[data-pending="true"]');
            for (let img of imgs) {
                if (img.dataset.loading) continue;
                img.dataset.loading = "true";
                try {
                    const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(`https://steamcommunity.com/profiles/${img.dataset.sid}/?xml=1`)}`);
                    const text = await res.text();
                    const m = text.match(/<avatarFull><!\[CDATA\[(.*?)\]\]><\/avatarFull>/);
                    if (m) { img.src = m[1]; img.style.opacity = "1"; delete img.dataset.pending; }
                } catch(e) {}
            }
        }

        init();
    </script>
</body>
</html>
